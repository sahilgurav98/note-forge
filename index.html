<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0f" id="theme-meta">
<meta name="description" content="NoteForge – Powerful note-taking with chapters, formatting, code, tables & PDF export">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NoteForge">
<link rel="manifest" id="manifest-placeholder">
<title>NoteForge</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,800;1,9..144,300&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
:root {
  --bg:#0d0d0f; --surface:#141416; --surface2:#1c1c20; --surface3:#242428;
  --border:#2a2a30; --border2:#3a3a42;
  --accent:#e8c547; --accent2:#f0d060;
  --text:#f0ede8; --text2:#a8a4a0; --text3:#6a6660;
  --shadow:0 4px 24px rgba(0,0,0,.45);
  --red:#ff5f5f; --green:#4ade80; --blue:#60a5fa; --purple:#a78bfa;
  --sidebar-w:272px; --radius:8px; --topbar-h:52px;
}
[data-theme="light"] {
  --bg:#f5f4f0; --surface:#ffffff; --surface2:#f0eeea; --surface3:#e8e5df;
  --border:#dedad2; --border2:#c8c4bc;
  --text:#1a1816; --text2:#5a5650; --text3:#9a9690;
  --shadow:0 4px 24px rgba(0,0,0,.12);
  --red:#d94040; --green:#22a060; --blue:#2563eb; --purple:#7c3aed;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;display:flex;flex-direction:column;transition:background .2s,color .2s}

/* TOP BAR */
#topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;z-index:200}
#logo{font-family:'Fraunces',serif;font-size:19px;font-weight:800;color:var(--accent);letter-spacing:-.5px;flex-shrink:0;user-select:none}
#logo span{color:var(--text3);font-weight:300}
#sidebar-toggle,#mobile-back{background:none;border:none;color:var(--text2);cursor:pointer;padding:7px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;flex-shrink:0}
#sidebar-toggle:hover,#mobile-back:hover{background:var(--surface3);color:var(--text)}
#mobile-back{display:none}
#note-meta{display:flex;gap:7px;align-items:center;flex:1;min-width:0}
.meta-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s;min-width:0}
.meta-input::placeholder{color:var(--text3)}
.meta-input:focus{border-color:var(--accent)}
#inp-chapter{width:100px;flex-shrink:0}
#inp-title{flex:1}
#inp-subtitle{flex:1;color:var(--text2)}
#topbar-actions{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tb-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tb-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2)}
.tb-btn.primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.tb-btn.primary:hover{background:var(--accent2)}
.tb-btn.active{background:var(--surface3);color:var(--text)}
.tb-btn svg{flex-shrink:0;width:13px;height:13px}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden;position:relative}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s cubic-bezier(.4,0,.2,1),opacity .2s;overflow:hidden;z-index:150}
#sidebar.collapsed{width:0;opacity:0}
#sidebar-header{padding:13px 14px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#sidebar-header h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3)}
#add-note-btn{background:var(--accent);color:#000;border:none;width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:background .15s;font-weight:700;line-height:1}
#add-note-btn:hover{background:var(--accent2)}
#sidebar-search{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
#sidebar-search input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
#sidebar-search input:focus{border-color:var(--accent)}
#sidebar-search input::placeholder{color:var(--text3)}
#notes-list{flex:1;overflow-y:auto;padding:6px}
#notes-list::-webkit-scrollbar{width:3px}
#notes-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.note-item{padding:10px 11px;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;transition:all .15s;margin-bottom:2px;position:relative}
.note-item:hover{background:var(--surface2)}
.note-item.active{background:var(--surface3);border-color:var(--border2)}
.note-item .ni-chapter{font-size:9px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.note-item .ni-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:22px}
.note-item .ni-date{font-size:10px;color:var(--text3);margin-top:3px}
.note-item .ni-del{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--red);cursor:pointer;opacity:0;transition:opacity .15s;font-size:13px;padding:4px;border-radius:4px}
.note-item:hover .ni-del{opacity:1}
.note-item .ni-rename{position:absolute;right:28px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;opacity:0;transition:opacity .15s;font-size:11px;padding:4px;border-radius:4px}
.note-item:hover .ni-rename{opacity:1}
.note-item .ni-rename:hover{color:var(--accent);background:var(--surface3)}
.note-item .ni-del:hover{background:rgba(255,95,95,.12)}

/* Inline rename input */
.ni-rename-input{background:var(--surface3);border:1px solid var(--accent);color:var(--text);padding:3px 7px;border-radius:5px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;outline:none;width:100%;box-sizing:border-box;margin-top:2px}

/* EDITOR AREA */
#editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* TOOLBAR */
#toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:5px 10px;display:flex;align-items:center;gap:1px;flex-wrap:nowrap;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#toolbar::-webkit-scrollbar{display:none}
.tool-sep{width:1px;height:20px;background:var(--border);margin:0 3px;flex-shrink:0}
.tool-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:5px 6px;border-radius:5px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;display:flex;align-items:center;gap:3px;transition:all .12s;white-space:nowrap;flex-shrink:0}
.tool-btn:hover,.tool-btn:active{background:var(--surface3);color:var(--text)}
.tool-btn.active{background:var(--accent);color:#000}
.tool-btn svg{width:14px;height:14px;flex-shrink:0}
.tl{font-size:11px}
.tool-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 5px;border-radius:5px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;flex-shrink:0;max-width:90px}
.tool-color{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);cursor:pointer;padding:2px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tool-color input[type=color]{width:18px;height:18px;border:none;cursor:pointer;background:none;padding:0;border-radius:3px}

/* TAGS BAR */
#tags-bar{padding:5px 12px;border-bottom:1px solid var(--border);display:flex;gap:5px;align-items:center;flex-wrap:wrap;background:var(--surface);flex-shrink:0;min-height:36px}
#tags-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;flex-shrink:0}
.tag{background:var(--surface3);border:1px solid var(--border2);color:var(--text2);padding:2px 8px;border-radius:20px;font-size:11px;display:flex;align-items:center;gap:3px}
.tag .tag-del{cursor:pointer;color:var(--text3);background:none;border:none;font-size:11px;line-height:1;transition:color .12s}
.tag .tag-del:hover{color:var(--red)}
#tag-input{background:none;border:none;outline:none;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;width:90px}
#tag-input::placeholder{color:var(--text3)}

/* FIND BAR */
#findbar{background:var(--surface2);border-bottom:1px solid var(--border);padding:7px 12px;display:none;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
#findbar.open{display:flex}
#findbar input{background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:5px 9px;border-radius:6px;font-size:13px;outline:none;width:140px;min-width:80px}
#findbar input:focus{border-color:var(--accent)}
.fb-btn{background:var(--surface3);border:1px solid var(--border2);color:var(--text2);padding:5px 9px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s;flex-shrink:0}
.fb-btn:hover{color:var(--text);background:var(--surface)}
#find-count{color:var(--text3);font-size:12px}

/* EDITOR SCROLL */
#editor-scroll{flex:1;overflow-y:auto;padding:36px 52px;display:flex;justify-content:center;scroll-behavior:smooth}
#editor-scroll::-webkit-scrollbar{width:5px}
#editor-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#editor-wrapper{width:100%;max-width:780px}

/* NOTE HEADER */
#note-header{margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:18px}
#disp-chapter{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:var(--accent);margin-bottom:7px}
#disp-title{font-family:'Fraunces',serif;font-size:34px;font-weight:800;color:var(--text);line-height:1.15;margin-bottom:6px}
#disp-subtitle{font-size:16px;color:var(--text2);font-weight:300;font-family:'Fraunces',serif;font-style:italic}
#disp-date{font-size:10px;color:var(--text3);margin-top:9px}

/* CONTENT EDITOR */
#content-editor{min-height:400px;outline:none;font-size:15px;line-height:1.8;color:var(--text);caret-color:var(--accent);word-break:break-word}
#content-editor:empty::before{content:"Start writing… use the toolbar to format, insert tables, code, images and more.";color:var(--text3);pointer-events:none}
#content-editor h1{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--text);margin:26px 0 10px;line-height:1.2}
#content-editor h2{font-family:'Fraunces',serif;font-size:21px;font-weight:600;color:var(--text);margin:20px 0 9px;padding-bottom:5px;border-bottom:1px solid var(--border)}
#content-editor h3{font-size:16px;font-weight:600;color:var(--accent);margin:16px 0 7px}
#content-editor p{margin-bottom:9px}
#content-editor strong{font-weight:700}
#content-editor em{font-style:italic;color:var(--text2)}
#content-editor u{text-decoration:underline;text-decoration-color:var(--accent)}
#content-editor s{text-decoration:line-through;color:var(--text3)}
#content-editor mark{background:rgba(232,197,71,.25);color:var(--accent2);padding:1px 3px;border-radius:3px}
#content-editor a{color:var(--blue);text-decoration:underline}
#content-editor a:hover{color:var(--accent)}
#content-editor ul,#content-editor ol{padding-left:22px;margin-bottom:11px}
#content-editor li{margin-bottom:4px}
#content-editor ul li::marker,#content-editor ol li::marker{color:var(--accent)}
#content-editor blockquote{border-left:3px solid var(--accent);padding:9px 16px;margin:14px 0;background:var(--surface2);border-radius:0 var(--radius) var(--radius) 0;color:var(--text2);font-style:italic}
#content-editor hr{border:none;border-top:1px solid var(--border2);margin:22px 0}
#content-editor table{border-collapse:collapse;width:100%;margin:14px 0;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;display:table}
#content-editor th{background:var(--surface3);color:var(--accent);padding:9px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border2)}
#content-editor td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
#content-editor tr:hover td{background:var(--surface2)}
#content-editor tr:last-child td{border-bottom:none}
#content-editor pre{background:#1a1a1f;border:1px solid var(--border2);border-radius:var(--radius);margin:14px 0;overflow:auto;position:relative}
[data-theme="light"] #content-editor pre{background:#f6f6f0}
#content-editor pre code.hljs{padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6;border-radius:var(--radius)}
#content-editor code:not(pre code){background:var(--surface3);color:var(--accent);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px}

/* IMAGE WRAPPER */
.img-wrap{display:inline-block;position:relative;margin:10px 0;max-width:100%;line-height:0;border-radius:var(--radius);border:2px solid transparent;transition:border-color .15s;cursor:default;vertical-align:top}
.img-wrap:hover,.img-wrap.selected{border-color:var(--accent)}
.img-wrap img{display:block;max-width:100%;border-radius:calc(var(--radius) - 2px);pointer-events:none;user-select:none;height:auto}
.img-resize-handle{position:absolute;right:-5px;bottom:-5px;width:14px;height:14px;background:var(--accent);border-radius:3px;cursor:se-resize;display:none;z-index:10;box-shadow:0 0 0 2px var(--bg)}
.img-wrap:hover .img-resize-handle,.img-wrap.selected .img-resize-handle{display:block}
.img-toolbar{position:absolute;top:-36px;left:0;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;display:none;gap:2px;padding:3px;z-index:20;box-shadow:var(--shadow);align-items:center;white-space:nowrap}
.img-wrap:hover .img-toolbar,.img-wrap.selected .img-toolbar{display:flex}
.img-tb-btn{background:none;border:none;color:var(--text2);padding:4px 7px;border-radius:5px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:3px;transition:all .12s;white-space:nowrap}
.img-tb-btn:hover{background:var(--surface3);color:var(--text)}
.img-tb-btn.del:hover{color:var(--red)}
.img-tb-btn svg{width:12px;height:12px}
.img-tb-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}

#content-editor .callout{display:flex;gap:10px;align-items:flex-start;padding:11px 14px;border-radius:var(--radius);margin:12px 0;background:var(--surface2);border:1px solid var(--border)}
#content-editor .callout.info{border-left:3px solid var(--blue)}
#content-editor .callout.warn{border-left:3px solid var(--accent)}
#content-editor .callout.success{border-left:3px solid var(--green)}
#content-editor .callout.error{border-left:3px solid var(--red)}
#content-editor .callout-icon{font-size:15px;flex-shrink:0;margin-top:1px}
#content-editor .callout-body{font-size:14px;color:var(--text2)}
#content-editor .math-block{background:var(--surface2);border:1px dashed var(--border2);border-radius:var(--radius);padding:13px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--purple);margin:12px 0;text-align:center}

/* STATUS BAR */
#statusbar{height:25px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:14px;font-size:11px;color:var(--text3);flex-shrink:0;overflow:hidden}
#statusbar span{display:flex;align-items:center;gap:3px;white-space:nowrap}
#save-indicator{margin-left:auto}
#save-indicator.saved{color:var(--green)}
#save-indicator.saving{color:var(--text3)}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:16px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:22px;width:min(440px,100%);transform:translateY(8px);transition:transform .2s;overflow-y:auto;max-height:calc(100vh - 60px)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h3{font-family:'Fraunces',serif;font-size:17px;font-weight:700;margin-bottom:14px;color:var(--text)}
.modal label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;margin-top:12px}
.modal label:first-of-type{margin-top:0}
.modal input,.modal select,.modal textarea{width:100%;background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:8px 11px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{resize:vertical;min-height:76px}
.modal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:18px}
.modal-actions button{padding:8px 17px;border-radius:7px;border:1px solid var(--border2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s}
.modal-cancel{background:var(--surface3);color:var(--text2)}
.modal-cancel:hover{color:var(--text)}
.modal-confirm{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.modal-confirm:hover{background:var(--accent2)}

/* FOCUS MODE */
body.focus-mode #sidebar,body.focus-mode #toolbar,body.focus-mode #tags-bar,body.focus-mode #statusbar{display:none!important}
body.focus-mode #topbar{opacity:0;transition:opacity .3s}
body.focus-mode #topbar:hover{opacity:1}
body.focus-mode #editor-scroll{padding:70px 80px}

/* DRAG OVER */
#editor-scroll.dragover{outline:2px dashed var(--accent);outline-offset:-6px}

/* MOBILE OVERLAY */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:140}

/* LIGHT THEME TWEAKS */
[data-theme="light"] #content-editor code:not(pre code){background:#e8e4dc}
[data-theme="light"] #content-editor blockquote{background:#ede9e1}
[data-theme="light"] #content-editor tr:hover td{background:#ede9e1}
[data-theme="light"] .img-resize-handle{box-shadow:0 0 0 2px #fff}

/* TABLET */
@media(max-width:900px){
  #inp-subtitle{display:none}
  #inp-chapter{width:85px}
  .btn-label{display:none}
  #btn-focus{display:none}
}

/* MOBILE */
@media(max-width:600px){
  :root{--topbar-h:50px;--sidebar-w:82vw}
  #sidebar{position:fixed;top:0;left:0;height:100%;width:var(--sidebar-w)!important;transform:translateX(-105%);opacity:1!important;z-index:160;transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow)}
  #sidebar.mobile-open{transform:translateX(0)}
  #sidebar-overlay{display:block;opacity:0;pointer-events:none;transition:opacity .28s}
  #sidebar-overlay.open{opacity:1;pointer-events:all}
  #sidebar.collapsed{width:var(--sidebar-w)!important;opacity:1!important}
  #note-meta{gap:5px}
  #inp-chapter,#inp-subtitle{display:none}
  #inp-title{font-size:12px}
  #btn-focus,#btn-find{display:none}
  #editor-scroll{padding:20px 16px}
  #disp-title{font-size:24px}
  #toolbar{padding:4px 8px;gap:0}
  .tool-sep{margin:0 2px}
  .tool-btn{padding:6px 5px}
  .tl{display:none}
  #statusbar{gap:8px;font-size:10px}
  #read-time{display:none}
  #mobile-back{display:flex}
  #tags-bar{padding:4px 10px}
  #findbar{flex-wrap:wrap}
  #findbar input{width:120px}
  .modal{padding:18px 16px}
  .note-item .ni-del{opacity:.7}
  .img-tb-btn{padding:6px 9px;font-size:12px}
}

@media print{
  #topbar,#sidebar,#toolbar,#statusbar,#tags-bar,#findbar,.img-toolbar,.img-resize-handle,#sidebar-overlay,#print-preview-overlay{display:none!important}
  #editor-scroll{overflow:visible;padding:0}
  body{background:#fff;color:#000;overflow:auto}
  #content-editor{color:#000}
  #note-header{border-color:#ccc}
  #disp-title,#disp-chapter{color:#000}
  .page-break-marker{page-break-after:always;break-after:page;height:0;overflow:hidden;display:block!important;border:none!important;margin:0!important;padding:0!important}
  .page-break-marker *{display:none!important}
}

/* PAGE BREAK MARKER */
.page-break-marker{
  position:relative;display:flex;align-items:center;gap:10px;
  margin:18px 0;cursor:default;user-select:none;
}
.page-break-marker::before,.page-break-marker::after{
  content:'';flex:1;height:1px;
  border-top:2px dashed #e8c547;opacity:.7;
}
.page-break-marker-label{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--accent);background:var(--bg);padding:2px 8px;border-radius:20px;
  border:1px dashed var(--accent);white-space:nowrap;flex-shrink:0;opacity:.8;
}
.page-break-marker-del{
  background:none;border:none;color:var(--red);cursor:pointer;
  font-size:14px;line-height:1;padding:2px 5px;border-radius:4px;
  transition:all .15s;flex-shrink:0;opacity:0;
}
.page-break-marker:hover .page-break-marker-del{opacity:1}
.page-break-marker-del:hover{background:rgba(255,95,95,.15)}

/* PRINT PREVIEW OVERLAY */
#print-preview-overlay{
  position:fixed;inset:0;z-index:2000;background:#525659;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#print-preview-overlay.open{opacity:1;pointer-events:all}
#pp-topbar{
  height:52px;background:#3a3a3e;border-bottom:1px solid #222;
  display:flex;align-items:center;gap:10px;padding:0 18px;flex-shrink:0;
}
#pp-topbar-title{font-family:'Fraunces',serif;font-size:15px;color:#e8c547;font-weight:700;flex:1}
#pp-topbar-subtitle{font-size:12px;color:#aaa;margin-left:4px}
.pp-btn{background:#555;border:1px solid #666;color:#eee;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;display:flex;align-items:center;gap:6px;transition:all .15s;flex-shrink:0}
.pp-btn:hover{background:#666;color:#fff}
.pp-btn.primary{background:#e8c547;border-color:#e8c547;color:#000;font-weight:700}
.pp-btn.primary:hover{background:#f0d060}
#pp-scroll{flex:1;overflow-y:auto;padding:28px 40px;display:flex;flex-direction:column;align-items:center;gap:0}
#pp-scroll::-webkit-scrollbar{width:6px}
#pp-scroll::-webkit-scrollbar-thumb{background:#666;border-radius:3px}

/* Simulated pages */
.pp-page{
  width:210mm;min-height:297mm;
  background:#fff;color:#111;
  padding:18mm 16mm;
  box-shadow:0 4px 28px rgba(0,0,0,.5);
  position:relative;
  font-family:Georgia,serif;font-size:11pt;line-height:1.7;
  margin-bottom:0;
}
.pp-page-num{
  position:absolute;bottom:10mm;right:14mm;
  font-size:9pt;color:#aaa;font-family:'DM Sans',sans-serif;
}
.pp-page-break-line{
  width:210mm;height:16px;
  display:flex;align-items:center;justify-content:center;
  gap:8px;flex-shrink:0;margin:0;
  background:#525659;
}
.pp-page-break-line span{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  color:#e8c547;opacity:.7;
}
.pp-page-break-line::before,.pp-page-break-line::after{
  content:'';flex:1;max-width:60px;height:1px;background:#e8c547;opacity:.4;
}

/* Print preview note header */
.pp-note-header{margin-bottom:14px;border-bottom:2px solid #111;padding-bottom:12px}
.pp-note-header .pp-chapter{font-size:8pt;text-transform:uppercase;letter-spacing:2px;color:#888;margin-bottom:5px}
.pp-note-header .pp-title{font-size:22pt;font-weight:800;margin:0 0 4px;line-height:1.2}
.pp-note-header .pp-subtitle{font-size:12pt;color:#555;font-style:italic;margin:0}
.pp-note-header .pp-date{font-size:8pt;color:#aaa;margin-top:6px}

/* Print preview content styling */
.pp-content h1{font-size:17pt;font-weight:700;margin:16px 0 7px;line-height:1.2}
.pp-content h2{font-size:13pt;font-weight:600;margin:13px 0 6px;border-bottom:1px solid #ddd;padding-bottom:3px}
.pp-content h3{font-size:11pt;font-weight:700;margin:10px 0 5px;color:#444}
.pp-content p{margin-bottom:7px}
.pp-content pre{background:#f4f4f4;border:1px solid #ddd;border-radius:4px;padding:9px 12px;font-size:8.5pt;overflow:auto;margin:10px 0}
.pp-content code{font-family:monospace;font-size:9pt;background:#f0f0f0;padding:1px 4px;border-radius:3px}
.pp-content pre code{background:none;padding:0}
.pp-content table{border-collapse:collapse;width:100%;margin:10px 0;font-size:9.5pt}
.pp-content th{background:#f0f0f0;padding:6px 10px;text-align:left;border-bottom:2px solid #ccc;font-weight:600}
.pp-content td{padding:5px 10px;border-bottom:1px solid #e0e0e0}
.pp-content blockquote{border-left:3px solid #999;padding:6px 13px;margin:10px 0;color:#555;font-style:italic}
.pp-content ul,.pp-content ol{padding-left:20px;margin-bottom:9px}
.pp-content li{margin-bottom:3px}
.pp-content img{max-width:100%;border-radius:4px}
.pp-content .callout{padding:8px 12px;background:#f9f9f9;border:1px solid #ddd;border-left:3px solid #999;border-radius:4px;margin:10px 0;font-size:9.5pt}
.pp-content .callout.info{border-left-color:#60a5fa}
.pp-content .callout.warn{border-left-color:#e8c547}
.pp-content .callout.success{border-left-color:#4ade80}
.pp-content .callout.error{border-left-color:#ff5f5f}
.pp-content .math-block{text-align:center;padding:8px;background:#f4f4f8;border-radius:4px;font-size:10pt;margin:10px 0}
.pp-content mark{background:rgba(255,220,0,.3);padding:1px 3px}
.pp-content .page-break-marker,.pp-content .img-toolbar,.pp-content .img-resize-handle{display:none!important}

@media(max-width:850px){
  .pp-page{width:100%;min-height:unset}
  .pp-page-break-line{width:100%}
  #pp-scroll{padding:16px 8px;gap:0}
}
</style>
</head>

      <button class="tool-btn" title="Clear"   onclick="fmt('removeFormat')"><svg viewBox="0 0 16 16" fill="none"><path d="M3 4l10 8M7 4h6M5 12h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
    </div>

    <!-- TAGS BAR -->
    <div id="tags-bar">
      <span id="tags-label">Tags</span>
      <div id="tags-container"></div>
      <input id="tag-input" placeholder="Add tag…" autocomplete="off">
    </div>

    <!-- EDITOR SCROLL -->

<script>
'use strict';
// ── STATE ──────────────────────────────────────────────────
let notes     = JSON.parse(localStorage.getItem('nf_notes') || '[]');
let theme     = localStorage.getItem('nf_theme') || 'dark';
let currentId = null, saveTimer = null, savedSel = null;
const editor  = document.getElementById('content-editor');
const isMob   = () => window.innerWidth <= 600;

// ── INIT ──────────────────────────────────────────────────
function init() {
  applyTheme(theme, false);
  renderList();
  if (!notes.length) newNote(); else loadNote(notes[0].id);
  setupPWA(); setupDragDrop(); setupImgInteractions();
  updateStats();
}

// ── THEME ─────────────────────────────────────────────────
function applyTheme(t, save=true) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('btn-theme').textContent = t==='dark' ? '☀️' : '🌙';
  document.getElementById('theme-meta').content    = t==='dark' ? '#0d0d0f' : '#ffffff';
  document.getElementById('hljs-theme').href = t==='dark'
    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css'
    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css';
  if (save) localStorage.setItem('nf_theme', t);
}
document.getElementById('btn-theme').addEventListener('click', () => applyTheme(theme==='dark'?'light':'dark'));

// ── NOTES ─────────────────────────────────────────────────
function newNote() {
  const id = Date.now().toString();
  notes.unshift({ id, chapter:'', title:'Untitled Note', subtitle:'', content:'', tags:[], created:new Date().toISOString(), modified:new Date().toISOString() });
  saveNotes(); renderList(); loadNote(id);
  if (isMob()) closeSidebar();
}

function loadNote(id) {
  currentId = id;
  const n = notes.find(x => x.id===id); if (!n) return;
  document.getElementById('inp-chapter').value  = n.chapter  || '';
  document.getElementById('inp-title').value    = n.title    || '';
  document.getElementById('inp-subtitle').value = n.subtitle || '';
  editor.innerHTML = n.content || '';
  syncHdr(n); renderTags(n.tags||[]);
  renderList(); setTimeout(()=>hljs.highlightAll(), 60);
  updateStats();
}

function syncHdr(n) {
  document.getElementById('disp-chapter').textContent  = n.chapter  || '';
  document.getElementById('disp-title').textContent    = n.title    || 'Untitled Note';
  document.getElementById('disp-subtitle').textContent = n.subtitle || '';
  document.getElementById('disp-date').textContent     = n.modified ? 'Modified '+new Date(n.modified).toLocaleString() : '';
}

function curNote() { return notes.find(n=>n.id===currentId); }

function saveNote() {
  const n = curNote(); if (!n) return;
  n.chapter=document.getElementById('inp-chapter').value;
  n.title=document.getElementById('inp-title').value||'Untitled Note';
  n.subtitle=document.getElementById('inp-subtitle').value;
  n.content=editor.innerHTML;
  n.modified=new Date().toISOString();
  syncHdr(n); saveNotes(); showSaved(); renderList();
}

function saveNotes() { localStorage.setItem('nf_notes', JSON.stringify(notes)); }

function deleteNote(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this note?')) return;
  notes=notes.filter(n=>n.id!==id); saveNotes(); renderList();
  if (currentId===id) notes.length ? loadNote(notes[0].id) : newNote();
}

document.getElementById('search-notes').addEventListener('input', function() {
  const q=this.value.toLowerCase();
  document.querySelectorAll('.note-item').forEach(el=>{
    const t=el.querySelector('.ni-title').textContent.toLowerCase();
    const c=el.querySelector('.ni-chapter').textContent.toLowerCase();
    el.style.display=(!q||t.includes(q)||c.includes(q))?'':'none';
  });
});

function renderList() {
  const list = document.getElementById('notes-list');
  list.innerHTML = '';
  notes.forEach(n => {
    const el = document.createElement('div');
    el.className='note-item'+(n.id===currentId?' active':'');
    el.dataset.id = n.id;
    el.innerHTML=`<div class="ni-chapter">${x(n.chapter||'Uncategorized')}</div><div class="ni-title">${x(n.title||'Untitled')}</div><div class="ni-date">${n.modified?new Date(n.modified).toLocaleDateString():''}</div><button class="ni-rename" title="Rename note">✎</button><button class="ni-del" title="Delete note">✕</button>`;
    el.addEventListener('click', ()=>{ loadNote(n.id); if(isMob()) closeSidebar(); });
    el.querySelector('.ni-del').addEventListener('click', e=>deleteNote(n.id,e));
    el.querySelector('.ni-rename').addEventListener('click', e=>{ e.stopPropagation(); startInlineRename(n.id, el); });
    el.querySelector('.ni-title').addEventListener('dblclick', e=>{ e.stopPropagation(); startInlineRename(n.id, el); });
    list.appendChild(el);
  });
}

function startInlineRename(id, el) {
  const n = notes.find(n=>n.id===id); if(!n) return;
  const titleEl = el.querySelector('.ni-title');
  const renameBtn = el.querySelector('.ni-rename');
  const delBtn = el.querySelector('.ni-del');
  const origTitle = n.title || 'Untitled Note';

  // Build inline input
  const inp = document.createElement('input');
  inp.className = 'ni-rename-input';
  inp.value = origTitle;
  inp.setAttribute('maxlength','120');

  titleEl.style.display = 'none';
  renameBtn.style.display = 'none';
  delBtn.style.display = 'none';
  titleEl.after(inp);
  inp.focus();
  inp.select();

  // Remove input listener so clicking note item doesn't trigger load
  const origClick = el.onclick;
  el.style.cursor = 'default';

  function commitRename() {
    const val = inp.value.trim() || 'Untitled Note';
    n.title = val;
    n.modified = new Date().toISOString();
    // If this is the current note, also update the topbar input and header
    if (currentId === id) {
      document.getElementById('inp-title').value = val;
      syncHdr(n);
    }
    saveNotes();
    renderList();
  }

  function cancelRename() {
    renderList();
  }

  inp.addEventListener('keydown', e=>{
    if (e.key==='Enter')  { e.preventDefault(); commitRename(); }
    if (e.key==='Escape') { e.preventDefault(); cancelRename(); }
    e.stopPropagation();
  });
  inp.addEventListener('blur', ()=>{ commitRename(); });
  inp.addEventListener('click', e=>e.stopPropagation());
}

// ── META INPUTS ───────────────────────────────────────────
['inp-chapter','inp-subtitle'].forEach(id => document.getElementById(id).addEventListener('input', scheduleSave));
document.getElementById('inp-title').addEventListener('input', function() {
  const n = curNote(); if(!n) return;
  n.title = this.value || 'Untitled Note';
  syncHdr(n);
  // Live-update sidebar title
  const el = document.querySelector(`.note-item[data-id="${n.id}"] .ni-title`);
  if(el) el.textContent = n.title;
  scheduleSave();
});

// ── EDITOR EVENTS ─────────────────────────────────────────
editor.addEventListener('input', ()=>{ scheduleSave(); updateStats(); });
editor.addEventListener('keydown', e=>{ if(e.key==='Tab'){ e.preventDefault(); document.execCommand('insertHTML',false,'\u00a0\u00a0\u00a0\u00a0'); }});
editor.addEventListener('keyup',   updateToolState);
editor.addEventListener('mouseup', updateToolState);

// ── FORMAT ────────────────────────────────────────────────
function fmt(c,a,b){ editor.focus(); document.execCommand(c,a||false,b||null); updateToolState(); }
function insertMark()       { editor.focus(); document.execCommand('insertHTML',false,'<mark>&#8203;</mark>'); }
function insertInlineCode() { editor.focus(); document.execCommand('insertHTML',false,'<code>&#8203;</code>'); }

document.getElementById('t-heading').addEventListener('change',function(){ editor.focus(); document.execCommand('formatBlock',false,this.value||'p'); this.value=''; });
document.getElementById('t-fontsize').addEventListener('change',function(){ editor.focus(); document.execCommand('fontSize',false,this.value); this.value=''; });

function updateToolState() {
  [['t-bold','bold'],['t-italic','italic'],['t-underline','underline'],['t-strike','strikeThrough']].forEach(([id,cmd])=>{
    const el=document.getElementById(id); if(el) el.classList.toggle('active',document.queryCommandState(cmd));
  });
}

// ── CODE ──────────────────────────────────────────────────
function openCodeModal()  { saveSel(); document.getElementById('code-content').value=''; openModal('modal-code'); }
function insertCode() {
  const lang=document.getElementById('code-lang').value;
  const code=document.getElementById('code-content').value;
  if (!code.trim()) { closeModal('modal-code'); return; }
  restoreSel(); fmt('insertHTML',false,`<pre><code class="language-${lang}">${x(code)}</code></pre><p><br></p>`);
  setTimeout(()=>hljs.highlightAll(),60); closeModal('modal-code');
}

// ── TABLE ─────────────────────────────────────────────────
function openTableModal() { saveSel(); openModal('modal-table'); }
function insertTable() {
  const rows=Math.max(1,+document.getElementById('tbl-rows').value||3);
  const cols=Math.max(1,+document.getElementById('tbl-cols').value||3);
  const hdr=document.getElementById('tbl-header').value==='1';
  let h='<table><tbody>';
  if(hdr){ h+='<tr>'; for(let c=0;c<cols;c++) h+=`<th contenteditable="true">Header ${c+1}</th>`; h+='</tr>'; }
  for(let r=0;r<rows;r++){ h+='<tr>'; for(let c=0;c<cols;c++) h+=`<td contenteditable="true">Cell</td>`; h+='</tr>'; }
  h+='</tbody></table><p><br></p>';
  restoreSel(); fmt('insertHTML',false,h); closeModal('modal-table');
}

// ── IMAGE ─────────────────────────────────────────────────
function openImageModal() { saveSel(); openModal('modal-image'); }
function insertImage() {
  const url  = document.getElementById('img-url').value;
  const file = document.getElementById('img-file').files[0];
  const alt  = document.getElementById('img-alt').value || 'Image';
  const wp   = document.getElementById('img-width').value;
  const ws   = wp ? `${wp}px` : '100%';
  restoreSel();
  if (file) {
    const r=new FileReader();
    r.onload=ev=>{ doInsertImg(ev.target.result,alt,ws); };
    r.readAsDataURL(file);
  } else if (url) doInsertImg(url,alt,ws);
  closeModal('modal-image');
}

function doInsertImg(src,alt,w='100%') {
  fmt('insertHTML',false,imgWrapHtml(src,alt,w)+'<p><br></p>');
  setTimeout(bindImgWraps,80);
}

function imgWrapHtml(src,alt,w) {
  return `<span class="img-wrap" contenteditable="false" style="width:${w}"><span class="img-toolbar" contenteditable="false"><button class="img-tb-btn" onclick="resizeImgPrompt(this)" title="Resize"><svg viewBox="0 0 14 14" fill="none"><path d="M1 1h5M1 1v5M13 13H8M13 13V8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> Resize</button><span class="img-tb-sep"></span><button class="img-tb-btn" onclick="alignImg(this,'left')"   title="Left">◀</button><button class="img-tb-btn" onclick="alignImg(this,'center')" title="Center">◆</button><button class="img-tb-btn" onclick="alignImg(this,'right')"  title="Right">▶</button><span class="img-tb-sep"></span><button class="img-tb-btn del" onclick="deleteImg(this)" title="Delete image"><svg viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Del</button></span><img src="${x(src)}" alt="${x(alt)}" style="width:100%;display:block;border-radius:6px"><span class="img-resize-handle"></span></span>`;
}

function bindImgWraps() {
  document.querySelectorAll('.img-wrap').forEach(wrap=>{
    if (wrap._b) return; wrap._b=true;
    const handle=wrap.querySelector('.img-resize-handle'); if(!handle) return;

    // Select on click/touch
    wrap.addEventListener('mousedown', ()=>selectImg(wrap));
    wrap.addEventListener('touchstart', ()=>selectImg(wrap),{passive:true});

    // Mouse resize
    handle.addEventListener('mousedown', e=>{
      e.preventDefault(); e.stopPropagation();
      const sx=e.clientX, sw=wrap.offsetWidth;
      const mv=ev=>{ wrap.style.width=Math.max(40,sw+ev.clientX-sx)+'px'; };
      const up=()=>{ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); scheduleSave(); };
      document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
    });

    // Touch resize
    handle.addEventListener('touchstart', e=>{
      e.preventDefault(); e.stopPropagation();
      const sx=e.touches[0].clientX, sw=wrap.offsetWidth;
      const mv=ev=>{ wrap.style.width=Math.max(40,sw+ev.touches[0].clientX-sx)+'px'; };
      const up=()=>{ document.removeEventListener('touchmove',mv); document.removeEventListener('touchend',up); scheduleSave(); };
      document.addEventListener('touchmove',mv,{passive:false}); document.addEventListener('touchend',up);
    },{passive:false});
  });
}

function selectImg(wrap) {
  document.querySelectorAll('.img-wrap.selected').forEach(w=>w.classList.remove('selected'));
  wrap.classList.add('selected');
}

function setupImgInteractions() {
  document.addEventListener('mousedown', e=>{ if(!e.target.closest('.img-wrap')) document.querySelectorAll('.img-wrap.selected').forEach(w=>w.classList.remove('selected')); });
  bindImgWraps();
  new MutationObserver(()=>bindImgWraps()).observe(editor,{childList:true,subtree:true});
}

function resizeImgPrompt(btn) {
  const wrap=btn.closest('.img-wrap');
  const cur=Math.round(wrap.offsetWidth);
  const v=prompt('Width in pixels:',cur);
  if (v&&!isNaN(v)&&+v>0){ wrap.style.width=+v+'px'; scheduleSave(); }
}

function alignImg(btn,dir) {
  const wrap=btn.closest('.img-wrap');
  if(dir==='left')  { wrap.style.marginLeft='0';    wrap.style.marginRight='auto'; wrap.style.display='inline-block'; }
  if(dir==='center'){ wrap.style.marginLeft='auto'; wrap.style.marginRight='auto'; wrap.style.display='block'; }
  if(dir==='right') { wrap.style.marginLeft='auto'; wrap.style.marginRight='0';    wrap.style.display='block'; }
  scheduleSave();
}

function deleteImg(btn) {
  if(confirm('Delete this image?')){ btn.closest('.img-wrap').remove(); scheduleSave(); }
}

// ── LINK ──────────────────────────────────────────────────
function openLinkModal() { saveSel(); document.getElementById('link-text').value=window.getSelection().toString()||''; openModal('modal-link'); }
function insertLink() {
  const url=document.getElementById('link-url').value;
  const txt=document.getElementById('link-text').value||url;
  if (!url) { closeModal('modal-link'); return; }
  restoreSel(); fmt('insertHTML',false,`<a href="${x(url)}" target="_blank">${x(txt)}</a>`); closeModal('modal-link');
}

// ── CALLOUT ───────────────────────────────────────────────
function openCalloutModal() { saveSel(); openModal('modal-callout'); }
function insertCallout() {
  const type=document.getElementById('callout-type').value;
  const txt=document.getElementById('callout-content').value;
  const ic={info:'ℹ️',warn:'⚠️',success:'✅',error:'❌'};
  restoreSel(); fmt('insertHTML',false,`<div class="callout ${type}"><span class="callout-icon">${ic[type]}</span><div class="callout-body">${x(txt)}</div></div><p><br></p>`); closeModal('modal-callout');
}

// ── MATH ──────────────────────────────────────────────────
function openMathModal() { saveSel(); openModal('modal-math'); }
function insertMath() {
  const f=document.getElementById('math-content').value;
  restoreSel(); fmt('insertHTML',false,`<div class="math-block">${x(f)}</div><p><br></p>`); closeModal('modal-math');
}

// ── TAGS ──────────────────────────────────────────────────
function renderTags(tags) {
  const c=document.getElementById('tags-container'); c.innerHTML='';
  (tags||[]).forEach(tag=>{
    const el=document.createElement('span'); el.className='tag';
    el.innerHTML=`${x(tag)}<button class="tag-del">×</button>`;
    el.querySelector('.tag-del').addEventListener('click',()=>removeTag(tag));
    c.appendChild(el);
  });
}
document.getElementById('tag-input').addEventListener('keydown',function(e){
  if((e.key==='Enter'||e.key===',')&&this.value.trim()){ e.preventDefault(); addTag(this.value.trim().replace(/,/g,'')); this.value=''; }
});
function addTag(tag) { const n=curNote(); if(!n) return; if(!n.tags) n.tags=[]; if(!n.tags.includes(tag)){ n.tags.push(tag); saveNotes(); renderTags(n.tags); } }
function removeTag(tag) { const n=curNote(); if(!n) return; n.tags=(n.tags||[]).filter(t=>t!==tag); saveNotes(); renderTags(n.tags); }

// ── STATS ─────────────────────────────────────────────────
function updateStats() {
  const t=editor.innerText||'';
  const w=t.trim()?t.trim().split(/\s+/).length:0;
  document.getElementById('word-count').textContent=`${w} word${w!==1?'s':''}`;
  document.getElementById('char-count').textContent=`${t.length} char${t.length!==1?'s':''}`;
  document.getElementById('read-time').textContent=`~${Math.max(1,Math.ceil(w/200))} min`;
}

// ── SAVE ──────────────────────────────────────────────────
function scheduleSave() {
  clearTimeout(saveTimer);
  const si=document.getElementById('save-indicator'); si.className='saving'; si.textContent='● Saving…';
  saveTimer=setTimeout(saveNote,800);
}
function showSaved() {
  const si=document.getElementById('save-indicator'); si.className='saved'; si.textContent='● Saved';
}

// ── PAGE BREAK ────────────────────────────────────────────
function insertPageBreak() {
  editor.focus();
  const marker = document.createElement('div');
  marker.className = 'page-break-marker';
  marker.contentEditable = 'false';
  marker.setAttribute('data-page-break', '1');
  marker.innerHTML = '<span class="page-break-marker-label">— Page Break —</span><button class="page-break-marker-del" title="Remove page break" onclick="this.closest(\'.page-break-marker\').remove();scheduleSave()">✕</button>';
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.collapse(false);
    range.insertNode(marker);
    // Move cursor after marker
    const after = document.createTextNode('\u00A0');
    marker.after(after);
    range.setStartAfter(after);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  } else {
    editor.appendChild(marker);
  }
  scheduleSave();
}

// ── PRINT PREVIEW ─────────────────────────────────────────
function openPrintPreview() {
  const n = curNote();
  const overlay = document.getElementById('print-preview-overlay');
  const scroll  = document.getElementById('pp-scroll');
  document.getElementById('pp-topbar-subtitle').textContent = n?.title ? `— ${n.title}` : '';
  scroll.innerHTML = '';

  // Clone editor content, strip img toolbars & page-break markers for splitting
  const raw = document.createElement('div');
  raw.innerHTML = editor.innerHTML;
  raw.querySelectorAll('.img-toolbar,.img-resize-handle').forEach(el=>el.remove());

  // Split content at page-break markers
  const segments = splitAtPageBreaks(raw);

  segments.forEach((segHtml, idx) => {
    if (idx > 0) {
      // visual separator between pages
      const sep = document.createElement('div');
      sep.className = 'pp-page-break-line';
      sep.innerHTML = '<span>Page Break</span>';
      scroll.appendChild(sep);
    }

    const page = document.createElement('div');
    page.className = 'pp-page';

    // First page gets the note header
    if (idx === 0) {
      const hdr = document.createElement('div');
      hdr.className = 'pp-note-header';
      hdr.innerHTML = `
        ${n?.chapter ? `<div class="pp-chapter">${esc(n.chapter)}</div>` : ''}
        <div class="pp-title">${esc(n?.title || 'Untitled Note')}</div>
        ${n?.subtitle ? `<div class="pp-subtitle">${esc(n.subtitle)}</div>` : ''}
        <div class="pp-date">${new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'})}</div>
      `;
      page.appendChild(hdr);
    }

    const content = document.createElement('div');
    content.className = 'pp-content';
    content.innerHTML = segHtml;
    page.appendChild(content);

    const pnum = document.createElement('div');
    pnum.className = 'pp-page-num';
    pnum.textContent = `${idx + 1} / ${segments.length}`;
    page.appendChild(pnum);

    scroll.appendChild(page);
  });

  overlay.classList.add('open');
}

function splitAtPageBreaks(container) {
  const segments = [];
  let current = document.createElement('div');

  function processNode(node) {
    if (node.nodeType === Node.ELEMENT_NODE && node.getAttribute && node.getAttribute('data-page-break') === '1') {
      segments.push(current.innerHTML);
      current = document.createElement('div');
    } else {
      current.appendChild(node.cloneNode(true));
    }
  }

  Array.from(container.childNodes).forEach(processNode);
  segments.push(current.innerHTML);
  return segments.filter(s => s.trim() !== '');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function closePrintPreview() {
  document.getElementById('print-preview-overlay').classList.remove('open');
}

document.getElementById('btn-print-preview').addEventListener('click', openPrintPreview);
document.getElementById('pp-close').addEventListener('click', closePrintPreview);
document.getElementById('pp-print').addEventListener('click', () => { closePrintPreview(); setTimeout(()=>window.print(), 80); });

// ── FIND & REPLACE ────────────────────────────────────────
document.getElementById('btn-find').addEventListener('click',toggleFind);
document.getElementById('fb-close').addEventListener('click',toggleFind);
document.getElementById('find-input').addEventListener('input',doFind);
document.getElementById('fb-next').addEventListener('click',()=>{});
document.getElementById('fb-prev').addEventListener('click',()=>{});
document.getElementById('fb-replace-one').addEventListener('click',()=>{
  const f=document.getElementById('find-input').value, r=document.getElementById('replace-input').value;
  if(!f) return; editor.innerHTML=editor.innerHTML.replace(f,r); scheduleSave(); doFind();
});
document.getElementById('fb-replace-all').addEventListener('click',()=>{
  const f=document.getElementById('find-input').value, r=document.getElementById('replace-input').value;
  if(!f) return; editor.innerHTML=editor.innerHTML.replace(new RegExp(rx(f),'gi'),r); scheduleSave(); doFind();
});
function toggleFind(){ const b=document.getElementById('findbar'); b.classList.toggle('open'); if(b.classList.contains('open')) document.getElementById('find-input').focus(); }
function doFind(){ const t=document.getElementById('find-input').value; const m=t?[...(editor.innerText||'').matchAll(new RegExp(rx(t),'gi'))]:[];  document.getElementById('find-count').textContent=m.length?`${m.length} found`:''; }
function rx(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

// ── PDF ───────────────────────────────────────────────────
document.getElementById('btn-pdf').addEventListener('click',()=>{
  const n=curNote();
  document.getElementById('pdf-filename').value=(n?.title||'note').replace(/\s+/g,'-').toLowerCase();
  openModal('modal-pdf');
});
function generatePDF() {
  const fn=document.getElementById('pdf-filename').value||'note';
  const sz=document.getElementById('pdf-size').value;
  const or=document.getElementById('pdf-orient').value;
  closeModal('modal-pdf');
  const n=curNote();
  const wrap=document.createElement('div');
  wrap.style.cssText='font-family:Georgia,serif;color:#111;line-height:1.7;max-width:700px;margin:0 auto;padding:20px';
  wrap.innerHTML=`<div style="margin-bottom:24px;border-bottom:2px solid #111;padding-bottom:14px">${n.chapter?`<div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#888;margin-bottom:6px">${x(n.chapter)}</div>`:''}<h1 style="font-size:28px;font-weight:800;margin:0 0 5px;line-height:1.2">${x(n.title||'Untitled')}</h1>${n.subtitle?`<p style="color:#555;font-style:italic;margin:0">${x(n.subtitle)}</p>`:''}<div style="font-size:10px;color:#aaa;margin-top:7px">${new Date().toLocaleDateString()}</div></div><div>${editor.innerHTML}</div>`;
  const s=document.createElement('style');
  s.textContent='*{box-sizing:border-box}pre{background:#f4f4f4;border:1px solid #ddd;border-radius:4px;padding:10px;font-size:12px;overflow:auto}code{font-family:monospace}table{border-collapse:collapse;width:100%}th{background:#f0f0f0;padding:7px 10px;text-align:left;border-bottom:2px solid #ccc}td{padding:6px 10px;border-bottom:1px solid #e0e0e0}blockquote{border-left:3px solid #999;padding:7px 14px;margin:10px 0;color:#555}h1{font-size:22px;margin:18px 0 7px}h2{font-size:17px;margin:14px 0 5px;border-bottom:1px solid #ddd;padding-bottom:3px}h3{font-size:14px;margin:10px 0 4px}img{max-width:100%;border-radius:4px}.callout{padding:9px 12px;background:#f9f9f9;border:1px solid #ddd;border-radius:4px;margin:10px 0;display:flex;gap:8px}.math-block{text-align:center;padding:10px;background:#f4f4f8;border-radius:4px;font-size:13px}mark{background:rgba(255,220,0,.3);padding:1px 3px}.img-toolbar,.img-resize-handle{display:none!important}.img-wrap{display:block;border:none!important;line-height:normal}';
  wrap.appendChild(s);
  html2pdf().set({margin:[14,14,14,14],filename:fn+'.pdf',image:{type:'jpeg',quality:.95},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:sz,orientation:or}}).from(wrap).save();
}

// ── FOCUS MODE ────────────────────────────────────────────
document.getElementById('btn-focus').addEventListener('click',()=>{
  document.body.classList.toggle('focus-mode');
  document.getElementById('btn-focus').classList.toggle('active');
});

// ── SIDEBAR ───────────────────────────────────────────────
document.getElementById('sidebar-toggle').addEventListener('click',()=>{ isMob()?openSidebar():document.getElementById('sidebar').classList.toggle('collapsed'); });
document.getElementById('mobile-back').addEventListener('click', openSidebar);
function openSidebar(){  document.getElementById('sidebar').classList.add('mobile-open');    document.getElementById('sidebar-overlay').classList.add('open'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('mobile-open'); document.getElementById('sidebar-overlay').classList.remove('open'); }
document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
document.getElementById('add-note-btn').addEventListener('click', newNote);
document.getElementById('btn-new').addEventListener('click', newNote);

// ── DRAG & DROP ───────────────────────────────────────────
function setupDragDrop() {
  const sc=document.getElementById('editor-scroll');
  sc.addEventListener('dragover', e=>{ e.preventDefault(); sc.classList.add('dragover'); });
  sc.addEventListener('dragleave',()=>sc.classList.remove('dragover'));
  sc.addEventListener('drop', e=>{ e.preventDefault(); sc.classList.remove('dragover'); const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/')){ const r=new FileReader(); r.onload=ev=>doInsertImg(ev.target.result,'Dropped image','100%'); r.readAsDataURL(f); }});
}

// ── MODALS ────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',function(e){ if(e.target===this) closeModal(this.id); }));

// ── SELECTION ─────────────────────────────────────────────
function saveSel()    { const s=window.getSelection(); savedSel=s.rangeCount>0?s.getRangeAt(0).cloneRange():null; }
function restoreSel() { editor.focus(); if(savedSel){ const s=window.getSelection(); s.removeAllRanges(); s.addRange(savedSel); } }

// ── KEYBOARD SHORTCUTS ────────────────────────────────────
document.addEventListener('keydown', e=>{
  const c=e.ctrlKey||e.metaKey;
  if(c&&e.key==='f')                 { e.preventDefault(); toggleFind(); }
  if(c&&e.key==='s')                 { e.preventDefault(); saveNote(); }
  if(e.key==='F11')                  { e.preventDefault(); document.getElementById('btn-focus').click(); }
  if(c&&e.shiftKey&&e.key==='N')     { e.preventDefault(); newNote(); }
  if(e.key==='Escape')               { ['modal-table','modal-image','modal-link','modal-code','modal-callout','modal-math','modal-pdf'].forEach(closeModal); closePrintPreview(); if(document.getElementById('findbar').classList.contains('open')) toggleFind(); }
});

// ── HELPERS ───────────────────────────────────────────────
function x(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── PWA ───────────────────────────────────────────────────
function setupPWA() {
  const m={name:'NoteForge',short_name:'NoteForge',description:'Note-taking app',start_url:'.',display:'standalone',background_color:'#0d0d0f',theme_color:'#0d0d0f',icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" fill="%230d0d0f" rx="32"/><text x="96" y="130" font-size="110" text-anchor="middle" fill="%23e8c547" font-family="serif" font-weight="900">N</text></svg>',sizes:'192x192',type:'image/svg+xml'}]};
  document.getElementById('manifest-placeholder').href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
  if('serviceWorker'in navigator){ const sw=`const C='nf-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['.']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`; navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{}); }
}

init();
</script>
